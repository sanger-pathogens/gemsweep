<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gemsweep — interactive pipeline diagram</title>
    <style>
      :root {
        --surface-0: #f7f6f3;
        --surface-1: #ffffff;
        --surface-2: #ffffff;
        --text-primary: #1a1a18;
        --text-secondary: #5f5e5a;
        --text-muted: #888780;
        --text-accent: #0c447c;
        --border: #e3e1d8;
        --border-strong: #b4b2a9;
        --border-accent: #378add;
        --bg-accent: #e6f1fb;
        --bg-warning: #faeeda;
        --border-warning: #ba7517;
        --text-warning: #633806;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
        --radius: 8px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --surface-0: #171715;
          --surface-1: #232320;
          --surface-2: #232320;
          --text-primary: #e8e6de;
          --text-secondary: #b4b2a9;
          --text-muted: #888780;
          --text-accent: #b5d4f4;
          --border: #3a3a36;
          --border-strong: #5f5e5a;
          --border-accent: #378add;
          --bg-accent: #0c447c;
          --bg-warning: #412402;
          --border-warning: #ef9f27;
          --text-warning: #fac775;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        background: var(--surface-0);
        color: var(--text-primary);
        font-family: var(--font-sans);
        max-width: 760px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 4rem;
        line-height: 1.6;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      p.lede {
        color: var(--text-secondary);
        font-size: 14px;
        margin-top: 0;
        margin-bottom: 2rem;
      }
      .card {
        background: var(--surface-1);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
      }
      select,
      input[type="checkbox"] {
        accent-color: var(--border-accent);
      }
      select {
        font-family: inherit;
        font-size: 13px;
        padding: 6px 8px;
        border-radius: var(--radius);
        border: 1px solid var(--border-strong);
        background: var(--surface-1);
        color: var(--text-primary);
      }
      select:disabled {
        opacity: 0.5;
      }
      .nbox rect {
        fill: var(--surface-1);
        stroke: var(--border-strong);
        stroke-width: 0.5;
        transition:
          fill 0.25s,
          stroke 0.25s;
      }
      .nbox .ntext,
      .nbox .nsub {
        fill: var(--text-secondary);
        transition: fill 0.25s;
        font-family: var(--font-sans);
      }
      .nbox.active rect {
        fill: var(--bg-accent);
        stroke: var(--border-accent);
        stroke-width: 1;
      }
      .nbox.active .ntext,
      .nbox.active .nsub {
        fill: var(--text-accent);
      }
      .nedge {
        stroke: var(--border-strong);
        stroke-width: 1.5;
        opacity: 0.35;
        fill: none;
        transition:
          opacity 0.25s,
          stroke 0.25s;
      }
      .nedge.active {
        stroke: var(--text-accent);
        opacity: 1;
      }
      .nbypass {
        stroke-dasharray: 4 3;
      }
      .stopmark {
        opacity: 0;
        transition: opacity 0.25s;
      }
      .stopmark.show {
        opacity: 1;
      }
      .th {
        font-size: 14px;
        font-weight: 500;
      }
      .ts {
        font-size: 12px;
        font-weight: 400;
      }
      footer {
        margin-top: 2rem;
        font-size: 12px;
        color: var(--text-muted);
      }
      footer a {
        color: var(--text-accent);
      }
    </style>
  </head>
  <body>
    <h1>gemsweep — interactive pipeline diagram</h1>
    <p class="lede">
      Select a configuration to see which stages run. Dashed lines are bypass
      routes.
    </p>

    <div class="card">
      <div
        style="
          display: flex;
          flex-wrap: wrap;
          gap: 20px;
          align-items: flex-end;
          margin-bottom: 1.25rem;
        "
      >
        <div>
          <label
            for="refMode"
            style="
              display: block;
              color: var(--text-secondary);
              font-size: 13px;
              margin-bottom: 4px;
            "
            >Reference mode</label
          >
          <select id="refMode" onchange="updateDiagram()">
            <option value="full" selected>full</option>
            <option value="index">index</option>
            <option value="refine">refine</option>
            <option value="autoselect">autoselect</option>
          </select>
        </div>
        <div>
          <label
            for="clusterDist"
            style="
              display: block;
              color: var(--text-secondary);
              font-size: 13px;
              margin-bottom: 4px;
            "
            >Cluster dist</label
          >
          <select id="clusterDist" onchange="updateDiagram()">
            <option value="core_acc" selected>core_acc (PopPUNK)</option>
            <option value="ani">ani (Sketchlib)</option>
          </select>
        </div>
        <label
          style="
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 6px;
            cursor: pointer;
            font-size: 13px;
          "
        >
          <input
            type="checkbox"
            id="refPrepOnly"
            onchange="updateDiagram()"
            style="width: 16px; height: 16px"
          />
          ref_prep_only
        </label>
      </div>

      <svg width="100%" viewBox="0 0 680 800" role="img">
        <title>gemsweep pipeline diagram</title>
        <desc>
          Shows which pipeline stages run based on selected reference mode,
          clustering method, and ref_prep_only.
        </desc>
        <defs>
          <marker
            id="arrow"
            viewBox="0 0 10 10"
            refX="8"
            refY="5"
            markerWidth="6"
            markerHeight="6"
            orient="auto-start-reverse"
          >
            <path
              d="M2 1L8 5L2 9"
              fill="none"
              stroke="context-stroke"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </marker>
        </defs>

        <path
          id="e_n0_n1a"
          class="nedge"
          d="M340,84 L132,104"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n0_n1b"
          class="nedge"
          d="M340,84 L332,104"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n0_n1c"
          class="nedge"
          d="M340,84 L532,104"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n1c_n2"
          class="nedge"
          d="M532,160 L532,190"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n1b_n3"
          class="nedge"
          d="M332,160 L350,260"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n2_n3"
          class="nedge"
          d="M532,234 L470,260"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n3_n4"
          class="nedge"
          d="M390,316 L390,350"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n4_n5"
          class="nedge"
          d="M390,394 L390,430"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n3_n5_bypass"
          class="nedge nbypass"
          d="M530,288 L580,288 L580,452 L530,452"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n1a_n6_bypass"
          class="nedge nbypass"
          d="M132,160 L90,160 L90,532 L250,532"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n5_n6"
          class="nedge"
          d="M390,474 L390,510"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n6_n7"
          class="nedge"
          d="M390,554 L390,580"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n7_n8"
          class="nedge"
          d="M390,624 L390,650"
          marker-end="url(#arrow)"
        />
        <path
          id="e_n8_n9"
          class="nedge"
          d="M390,694 L390,720"
          marker-end="url(#arrow)"
        />

        <g class="nbox" data-node="n0">
          <rect x="240" y="40" width="200" height="44" rx="8" />
          <text
            class="th ntext"
            x="340"
            y="62"
            text-anchor="middle"
            dominant-baseline="central"
          >
            Input reads
          </text>
        </g>

        <g class="nbox" data-node="n1a">
          <rect x="40" y="104" width="185" height="56" rx="8" />
          <text
            class="th ntext"
            x="132"
            y="124"
            text-anchor="middle"
            dominant-baseline="central"
          >
            Provided index
          </text>
          <text
            class="ts nsub"
            x="132"
            y="144"
            text-anchor="middle"
            dominant-baseline="central"
          >
            ref_mode=index
          </text>
        </g>
        <g class="nbox" data-node="n1b">
          <rect x="240" y="104" width="185" height="56" rx="8" />
          <text
            class="th ntext"
            x="332"
            y="124"
            text-anchor="middle"
            dominant-baseline="central"
          >
            Reference list
          </text>
          <text
            class="ts nsub"
            x="332"
            y="144"
            text-anchor="middle"
            dominant-baseline="central"
          >
            full / refine
          </text>
        </g>
        <g class="nbox" data-node="n1c">
          <rect x="440" y="104" width="185" height="56" rx="8" />
          <text
            class="th ntext"
            x="532"
            y="124"
            text-anchor="middle"
            dominant-baseline="central"
          >
            Sylph query GTDB
          </text>
          <text
            class="ts nsub"
            x="532"
            y="144"
            text-anchor="middle"
            dominant-baseline="central"
          >
            ref_mode=autoselect
          </text>
        </g>

        <g class="nbox" data-node="n2">
          <rect x="440" y="190" width="185" height="44" rx="8" />
          <text
            class="th ntext"
            x="532"
            y="212"
            text-anchor="middle"
            dominant-baseline="central"
          >
            Group by taxon
          </text>
        </g>

        <g class="nbox" data-node="n3">
          <rect x="250" y="260" width="280" height="56" rx="8" />
          <text
            class="th ntext"
            x="390"
            y="280"
            text-anchor="middle"
            dominant-baseline="central"
          >
            Cluster references
          </text>
          <text
            class="ts nsub"
            id="n3-subtitle"
            x="390"
            y="300"
            text-anchor="middle"
            dominant-baseline="central"
          >
            PopPUNK / core-accessory
          </text>
        </g>

        <g class="nbox" data-node="n4">
          <rect x="250" y="350" width="280" height="44" rx="8" />
          <text
            class="th ntext"
            x="390"
            y="372"
            text-anchor="middle"
            dominant-baseline="central"
          >
            Derep to representatives
          </text>
        </g>

        <g class="nbox" data-node="n5">
          <rect x="250" y="430" width="280" height="44" rx="8" />
          <text
            class="th ntext"
            x="390"
            y="452"
            text-anchor="middle"
            dominant-baseline="central"
          >
            Build Themisto index
          </text>
        </g>

        <g id="stopBadge" class="stopmark" transform="translate(132,176)">
          <rect
            x="-72"
            y="-14"
            width="144"
            height="26"
            rx="13"
            fill="var(--bg-warning)"
            stroke="var(--border-warning)"
            stroke-width="0.5"
          />
          <text
            class="ts"
            x="0"
            y="1"
            text-anchor="middle"
            dominant-baseline="central"
            fill="var(--text-warning)"
          >
            Run stops here
          </text>
        </g>

        <g class="nbox" data-node="n6">
          <rect x="250" y="510" width="280" height="44" rx="8" />
          <text
            class="th ntext"
            x="390"
            y="532"
            text-anchor="middle"
            dominant-baseline="central"
          >
            Pseudoalign reads (Themisto)
          </text>
        </g>

        <g class="nbox" data-node="n7">
          <rect x="250" y="580" width="280" height="44" rx="8" />
          <text
            class="th ntext"
            x="390"
            y="602"
            text-anchor="middle"
            dominant-baseline="central"
          >
            mSWEEP abundances
          </text>
        </g>

        <g class="nbox" data-node="n8">
          <rect x="250" y="650" width="280" height="44" rx="8" />
          <text
            class="th ntext"
            x="390"
            y="672"
            text-anchor="middle"
            dominant-baseline="central"
          >
            mGEMS binning
          </text>
        </g>

        <g class="nbox" data-node="n9">
          <rect x="250" y="720" width="280" height="44" rx="8" />
          <text
            class="th ntext"
            x="390"
            y="742"
            text-anchor="middle"
            dominant-baseline="central"
          >
            Binned reads output
          </text>
        </g>
      </svg>

      <div
        style="
          display: flex;
          gap: 20px;
          margin-top: 1rem;
          font-size: 12px;
          color: var(--text-secondary);
        "
      >
        <span style="display: flex; align-items: center; gap: 6px"
          ><span
            style="
              width: 10px;
              height: 10px;
              border-radius: 2px;
              background: var(--bg-accent);
              border: 0.5px solid var(--border-accent);
              display: inline-block;
            "
          ></span
          >Active this run</span
        >
        <span style="display: flex; align-items: center; gap: 6px"
          ><span
            style="
              width: 10px;
              height: 10px;
              border-radius: 2px;
              background: var(--surface-1);
              border: 0.5px solid var(--border-strong);
              display: inline-block;
            "
          ></span
          >Not used this run</span
        >
      </div>
    </div>

    <footer>
      Reflects gemsweep's <code>ref_mode</code> / <code>cluster_dist</code> /
      <code>ref_prep_only</code> branching as documented in the README.
      <a href="https://github.com/sanger-pathogens/gemsweep">View source</a>.
    </footer>

    <script>
      const nodeBottoms = { n1a: [132, 172], n5: [390, 486] };

      function updateDiagram() {
        const mode = document.getElementById("refMode").value;
        const cluster = document.getElementById("clusterDist").value;
        const prepOnly = document.getElementById("refPrepOnly").checked;
        const clusterSelect = document.getElementById("clusterDist");
        clusterSelect.disabled = mode === "index" || mode === "autoselect";

        document
          .querySelectorAll(".nbox")
          .forEach((el) => el.classList.remove("active"));
        document
          .querySelectorAll(".nedge")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById("stopBadge").classList.remove("show");

        const actN = (id) =>
          document
            .querySelector('[data-node="' + id + '"]')
            .classList.add("active");
        const actE = (id) =>
          document.getElementById(id).classList.add("active");

        const readsNeeded = mode === "autoselect" || !prepOnly;
        if (readsNeeded) actN("n0");
        let endNode = null;

        if (mode === "index") {
          actN("n1a");
          if (readsNeeded) actE("e_n0_n1a");
          endNode = "n1a";
        } else if (mode === "full") {
          actN("n1b");
          if (readsNeeded) actE("e_n0_n1b");
          actN("n3");
          actE("e_n1b_n3");
          actE("e_n3_n5_bypass");
          actN("n5");
          endNode = "n5";
        } else if (mode === "refine") {
          actN("n1b");
          if (readsNeeded) actE("e_n0_n1b");
          actN("n3");
          actE("e_n1b_n3");
          actN("n4");
          actE("e_n3_n4");
          actE("e_n4_n5");
          actN("n5");
          endNode = "n5";
        } else if (mode === "autoselect") {
          actN("n1c");
          actE("e_n0_n1c");
          actN("n2");
          actE("e_n1c_n2");
          actN("n3");
          actE("e_n2_n3");
          actN("n4");
          actE("e_n3_n4");
          actE("e_n4_n5");
          actN("n5");
          endNode = "n5";
        }

        const n3sub = document.getElementById("n3-subtitle");
        if (mode === "autoselect") n3sub.textContent = "PopPUNK (forced)";
        else if (cluster === "ani") n3sub.textContent = "Sketchlib / ANI";
        else n3sub.textContent = "PopPUNK / core-accessory";

        if (!prepOnly) {
          actN("n6");
          actN("n7");
          actN("n8");
          actN("n9");
          actE("e_n6_n7");
          actE("e_n7_n8");
          actE("e_n8_n9");
          if (mode === "index") actE("e_n1a_n6_bypass");
          else actE("e_n5_n6");
        } else {
          const badge = document.getElementById("stopBadge");
          const pos = nodeBottoms[endNode];
          badge.setAttribute(
            "transform",
            "translate(" + pos[0] + "," + pos[1] + ")",
          );
          badge.classList.add("show");
        }
      }
      updateDiagram();
    </script>
  </body>
</html>
